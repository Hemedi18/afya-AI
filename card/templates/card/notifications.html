{% extends 'base.html' %}

{% block title %}Arifa za Kadi{% endblock %}

{% block content %}
<div class="container py-3" style="max-width:860px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0 fw-bold"><i class="bi bi-bell me-2"></i>Arifa za Kadi</h4>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-outline-danger rounded-pill" type="submit"><i class="bi bi-check2-all me-1"></i>Weka zote kama zimesomwa</button>
    </form>
  </div>

  {% for n in notifications %}
  <div class="card-custom p-3 mb-2 {% if not n.is_read %}border border-danger-subtle{% endif %}">
    <div class="d-flex justify-content-between align-items-start gap-2">
      <div>
        <div class="fw-semibold">{{ n.title }}</div>
        <div class="small text-muted">{{ n.body }}</div>
      </div>
      <small class="text-muted">{{ n.created_at|timesince }} zilizopita</small>
    </div>
  </div>
  {% empty %}
  <div class="card-custom p-3 text-muted">Hakuna arifa bado.</div>
  {% endfor %}
</div>
{% endblock %}
