<!-- Chart.js Dashboard Example (Pharmacy Dashboard) -->
<canvas id="sales-analytics-chart" width="400" height="180"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctx = document.getElementById('sales-analytics-chart').getContext('2d');
  const salesChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: {{ sales_labels|safe }},
      datasets: [{
        label: 'Sales',
        data: {{ sales_data|safe }},
        backgroundColor: 'rgba(42, 157, 143, 0.6)',
        borderColor: 'rgba(42, 157, 143, 1)',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });
</script>
