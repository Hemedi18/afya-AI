{% extends "base.html" %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'puberty/puberty.css' %}?v=20260405">
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="puberty-card p-4">
        <h2 class="mb-3">Puberty Assessment</h2>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary mt-2" type="submit">Submit</button>
        </form>
        {% if stage %}
          <div class="alert alert-success mt-3">Your estimated puberty stage: <strong>{{ stage }}</strong></div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
