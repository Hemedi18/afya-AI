{% extends 'base.html' %}

{% block title %}Add Status | Jamii{% endblock %}

{% block content %}
<div class="container py-3" style="max-width:760px;">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h5 class="fw-bold mb-0"><i class="bi bi-broadcast-pin me-2"></i>Add Status</h5>
                <a href="{% url 'chats:feed_status' %}" class="btn btn-sm btn-outline-secondary rounded-pill"><i class="bi bi-arrow-left"></i> Back</a>
            </div>
            <form method="post" action="{% url 'chats:status_create' %}" enctype="multipart/form-data" class="row g-3">
                {% csrf_token %}
                <input type="hidden" name="next" value="{% url 'chats:feed_status' %}">
                <div class="col-12">
                    <label class="form-label small fw-semibold">Group (optional)</label>
                    <select name="group_id" class="form-select">
                        <option value="">Default community</option>
                        {% for group in groups %}
                        <option value="{{ group.id }}" {% if selected_group and selected_group.id == group.id %}selected{% endif %}>{{ group.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label small fw-semibold">Status text</label>
                    <input type="text" name="content" maxlength="250" required autocomplete="off" class="form-control" placeholder="Andika status yako...">
                </div>
                <div class="col-12">
                    <label class="form-label small fw-semibold">Image (optional)</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>
                <div class="col-12 d-grid">
                    <button class="btn btn-danger rounded-pill" type="submit"><i class="bi bi-send-fill me-1"></i>Publish status</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
